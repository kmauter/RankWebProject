name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: 167.99.13.184
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /root/RankWebProject
            git checkout -- .
            git clean -fd app/__pycache__/ || true
            git pull origin main
            venv/bin/pip install -r requirements.txt
            export SECRET_KEY=$(grep SECRET_KEY app/.env | cut -d'"' -f2)
            venv/bin/python -m flask db upgrade || true
            pkill gunicorn || true
            sleep 2
            cd /root/RankWebProject
            venv/bin/gunicorn -b 127.0.0.1:8000 run:app --daemon --access-logfile /var/log/gunicorn-access.log --error-logfile /var/log/gunicorn-error.log
            systemctl restart rankbot
            cd /root/RankWebProject/client
            NODE_OPTIONS="--max-old-space-size=1024" npm run build
            echo "Deploy complete"
